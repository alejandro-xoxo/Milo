<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILO - Interfaz de Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --panel-bg: rgba(5, 5, 5, 0.85);
            --border-color: rgba(255, 255, 255, 0.15);
            /* Avatar States - Ultra Realistic & Monochrome */
            --idle-color: #ffffff;      /* Blanco puro */
            --process-color: #c026d3;   /* Morado rojizo para pensar */
            --listen-color: #00e5bc;    /* Azul verdoso para escuchar */
            --speak-color: #ffffff;     /* Blanco puro */
            --error-color: #ff3333;     /* Rojo intenso para errores */
            --error-glow: rgba(255, 51, 51, 0.4);

            --message-user-bg: rgba(255, 255, 255, 0.08);
            --message-milo-bg: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .container {
            width: 90%; max-width: 1400px; height: 90%;
            display: flex; flex-direction: column; gap: 30px; z-index: 5;
            position: relative;
        }

        header {
            text-align: center; font-family: 'Outfit', sans-serif;
            text-transform: uppercase; letter-spacing: 6px;
            font-weight: 800; font-size: 2.5rem; color: #fff;
            background: linear-gradient(90deg, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.2));
        }

        .main-content {
            display: flex; flex: 1; gap: 50px; justify-content: center; min-height: 0; position: relative;
        }

        .avatar-container {
            position: relative; width: 250px; height: 250px;
            display: flex; justify-content: center; align-items: center;
            flex-shrink: 0; align-self: center; flex-direction: column;
            /* El canvas 3D ocupa la pantalla, pero este contenedor sitúa lógicamente los subtítulos */
            pointer-events: auto; /* Permite capturar eventos del ratón para el avatar 3D */
        }

        /* Subtitles */
        .subtitles {
            position: absolute; bottom: -65px; left: 50%; transform: translateX(-50%);
            width: 480px; max-width: 90vw; text-align: center;
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem; font-weight: 300; letter-spacing: 1px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 20px var(--idle-color);
            min-height: 2em; pointer-events: none;
            transition: text-shadow 0.5s;
        }

        /* Side Panel */
        .side-panel {
            position: absolute; right: -360px; top: 0; bottom: 0; width: 340px;
            background: var(--panel-bg); border-left: 1px solid var(--border-color);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; z-index: 10;
            border-radius: 24px 0 0 24px; box-shadow: -15px 0 40px rgba(0,0,0,0.8);
        }

        .side-panel.open { right: -40px; } 

        .panel-toggle {
            position: absolute; left: -45px; top: 50%; transform: translateY(-50%);
            width: 45px; height: 80px; background: var(--panel-bg);
            border: 1px solid var(--border-color); border-right: none;
            border-radius: 16px 0 0 16px; cursor: pointer; color: white;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(25px); font-size: 1.2rem;
            transition: background 0.3s, color 0.3s;
        }
        .panel-toggle:hover { background: rgba(255,255,255,0.1); }

        .side-panel-content { padding: 30px; overflow-y: auto; flex: 1; scrollbar-width: none; }
        .side-panel-content::-webkit-scrollbar { display: none; }
        
        .side-panel-content h3 { 
            margin-top: 0; font-family: 'Outfit', sans-serif; font-size: 1.2rem; 
            font-weight: 600; color: #fff; letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color); padding-bottom: 15px; 
        }
        
        .task-list { list-style: none; padding: 0; margin: 0; font-size: 0.95rem; color: #d1d5db; }
        .task-list li { 
            margin-bottom: 15px; padding: 12px 16px; 
            background: rgba(255,255,255,0.03); border-radius: 12px; 
            border-left: 4px solid var(--process-color); 
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            line-height: 1.4; font-weight: 300;
        }
        .task-list li.error { border-left-color: var(--error-color); color: var(--error-color); background: rgba(239, 68, 68, 0.05); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Chat Section — Premium Gray Glassmorphism */
        .chat-section {
            flex: 1; display: flex; flex-direction: column;
            background: rgba(8, 8, 8, 0.85);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) saturate(1.2);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            overflow: hidden; max-width: 600px;
            position: relative;
        }
        .chat-section::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px; pointer-events: none;
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.02) 100%);
            z-index: 0;
        }

        .chat-history {
            flex: 1; padding: 25px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
            position: relative; z-index: 1;
        }
        .chat-history::-webkit-scrollbar { width: 5px; }
        .chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        .chat-history::-webkit-scrollbar-track { background: transparent; }

        .message {
            max-width: 85%; padding: 14px 18px; border-radius: 18px;
            font-size: 1rem; line-height: 1.5; font-weight: 300;
            animation: msgAppear 0.4s cubic-bezier(0.16, 1, 0.3, 1); letter-spacing: 0.3px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .message.user {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.08);
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .message.milo {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.12);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        @keyframes msgAppear {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .input-area {
            display: flex; padding: 20px; gap: 15px;
            background: rgba(5, 5, 5, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            position: relative; z-index: 1;
        }

        input[type="text"] {
            flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.12);
            color: white; padding: 0 20px; border-radius: 12px; font-size: 1rem;
            outline: none; transition: all 0.3s; font-family: 'Inter', sans-serif;
            font-weight: 300;
        }
        input[type="text"]:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); box-shadow: 0 0 15px rgba(255, 255, 255, 0.15); }

        .btn {
            background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.15);
            padding: 0 24px; border-radius: 12px; cursor: pointer; font-size: 1rem;
            transition: all 0.3s; display: flex; justify-content: center; align-items: center;
            font-family: 'Outfit', sans-serif; font-weight: 600; letter-spacing: 1px;
        }
        .btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn.mic { padding: 0; width: 50px; height: 50px; border-radius: 50%; font-size: 1.2rem; }
        
        .btn.mic.recording {
            background: var(--error-color);
            border-color: var(--error-color);
            box-shadow: 0 0 20px var(--error-glow);
            animation: pulse-recording 1.5s infinite;
        }
        
        .ptt-hint {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-size: 0.8rem; color: #888; font-weight: 300; white-space: nowrap;
            opacity: 0.7;
        }

        @keyframes pulse-recording {
            0% { box-shadow: 0 0 10px var(--error-glow); }
            50% { box-shadow: 0 0 30px var(--error-glow); }
            100% { box-shadow: 0 0 10px var(--error-glow); }
        }
        
        /* PTT Overlay Hint */
        .ptt-overlay {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            font-size: 0.9rem; color: #aaa; z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
        }
        .ptt-overlay.visible { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        .ptt-overlay span { color: #fff; font-weight: 600; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 6px; margin: 0 5px; }

    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="ptt-overlay" id="ptt-overlay">Mantén presionado <span>Espacio</span> para hablar</div>

    <div class="container">
        <header>M.I.L.O.</header>
        <div class="main-content">
            <div class="avatar-container" id="milo-avatar">
                <div class="subtitles" id="subtitles"></div>
            </div>

            <div class="chat-section">
                <div class="chat-history" id="chat-history">
                    <div class="message milo">Sistemas en línea. Mantén presionada la barra espaciadora para comunicarte.</div>
                </div>
                <div style="position: relative;">
                    <div class="input-area">
                        <button class="btn mic" id="mic-btn">🎙️</button>
                        <input type="text" id="text-input" placeholder="Ingresa tu comando o usa Espacio..." autocomplete="off">
                        <button class="btn" id="send-btn">Enviar</button>
                    </div>
                </div>
            </div>

            <div class="side-panel" id="side-panel">
                <div class="panel-toggle" id="panel-toggle">❮</div>
                <div class="side-panel-content">
                    <h3>Procesos Activos</h3>
                    <ul class="task-list" id="task-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Logic -->
    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws/voice`);
        const chatHistory = document.getElementById('chat-history');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const subtitles = document.getElementById('subtitles');
        const sidePanel = document.getElementById('side-panel');
        const panelToggle = document.getElementById('panel-toggle');
        const taskList = document.getElementById('task-list');
        const pttOverlay = document.getElementById('ptt-overlay');
        
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];

        let audioCtx;
        let analyser;
        let currentSourceNode = null;

        function ensureAudioContext() {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
            }
            if(audioCtx.state === 'suspended') {
                audioCtx.resume().catch(err => console.log("AudioContext resume failed:", err));
            }
        }

        // Initialize/resume audio context on user gesture events
        document.addEventListener('click', ensureAudioContext, { once: false });
        document.addEventListener('keydown', ensureAudioContext, { once: false });

        panelToggle.addEventListener('click', () => {
            sidePanel.classList.toggle('open');
            panelToggle.textContent = sidePanel.classList.contains('open') ? '❯' : '❮';
        });

        function setAvatarState(state) {
            // Update UI elements based on state if needed
            if(state === 'error') {
                subtitles.style.textShadow = '0 4px 15px rgba(0,0,0,0.8), 0 0 20px var(--error-color)';
            } else if (state === 'speaking') {
                subtitles.style.textShadow = '0 4px 15px rgba(0,0,0,0.8), 0 0 20px var(--speak-color)';
            } else if (state === 'listening') {
                subtitles.style.textShadow = '0 4px 15px rgba(0,0,0,0.8), 0 0 20px var(--listen-color)';
            } else if (state === 'processing') {
                subtitles.style.textShadow = '0 4px 15px rgba(0,0,0,0.8), 0 0 20px var(--process-color)';
            } else {
                subtitles.style.textShadow = '0 4px 15px rgba(0,0,0,0.8), 0 0 20px var(--idle-color)';
            }
            // Trigger 3D update
            if(window.update3DAvatar) window.update3DAvatar(state, null, 0);
        }

        function addBackgroundTask(text, isError = false) {
            const time = new Date().toLocaleTimeString('es-ES', {hour12: false});
            const li = document.createElement('li');
            li.innerHTML = `<span style="opacity:0.5;font-size:0.8em;margin-right:8px;">[${time}]</span> ${text}`;
            if(isError) li.className = 'error';
            taskList.appendChild(li);
            if(!sidePanel.classList.contains('open')) {
                sidePanel.classList.add('open');
                panelToggle.textContent = '❯';
            }
            const panelContent = document.querySelector('.side-panel-content');
            panelContent.scrollTop = panelContent.scrollHeight;
        }

        let subtitleInterval;
        function showSubtitles(text, durationMs) {
            clearInterval(subtitleInterval);
            subtitles.textContent = '';
            if(!text) return;
            const chars = text.split('');
            let idx = 0;
            const delay = durationMs ? (durationMs / chars.length) : 50;
            subtitleInterval = setInterval(() => {
                if (idx < chars.length) {
                    subtitles.textContent += chars[idx];
                    idx++;
                } else {
                    clearInterval(subtitleInterval);
                }
            }, delay);
        }

        ws.onopen = () => { console.log("WebSocket connected."); setAvatarState('idle'); };

        let lastTextResponse = '';

        ws.onmessage = async (event) => {
            if (typeof event.data === "string") {
                const data = JSON.parse(event.data);
                if (data.type === "text") {
                    addMessage(data.text, 'milo');
                    lastTextResponse = data.text;
                } else if (data.type === "status") {
                    addBackgroundTask(data.text);
                } else if (data.type === "quota_error") {
                    setAvatarState('error');
                    addBackgroundTask("Límite alcanzado. Tarea encolada (429).", true);
                    addMessage(data.text, 'milo');
                    lastTextResponse = data.text;
                } else if (data.type === "error" || data.status === 429) {
                    if(data.status === 429 || (data.error && data.error.includes("429"))) {
                        setAvatarState('error');
                        addBackgroundTask("Tarea encolada", true);
                        addMessage("Límite alcanzado. Tarea encolada en background.", 'milo');
                    } else {
                        setAvatarState('error');
                        addMessage(`Error: ${data.error}`, 'milo');
                    }
                    setTimeout(() => setAvatarState('idle'), 3000);
                }
            } else if (event.data instanceof Blob) {
                playAudioResponse(event.data);
            }
        };

        async function playAudioResponse(blob) {
            ensureAudioContext();
            
            try {
                if (currentSourceNode) {
                    try { currentSourceNode.stop(); } catch(e) {}
                }

                // Create a Blob with explicit mime type for safer arrayBuffer conversion
                const audioBlob = new Blob([blob], { type: 'audio/mp3' });
                const arrayBuffer = await audioBlob.arrayBuffer();
                
                // Decode audio data natively to bypass HTML5 audio autoplay/CORS restrictions
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                currentSourceNode = source;
                
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                setAvatarState('speaking');
                source.start(0);
                
                const duration = audioBuffer.duration * 1000;
                if(lastTextResponse) showSubtitles(lastTextResponse, duration);
                lastTextResponse = '';
                
                let isPlaying = true;
                
                function renderFrame() {
                    if(!isPlaying) return;
                    requestAnimationFrame(renderFrame);
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i=0; i<bufferLength; i++) sum += dataArray[i];
                    let avg = sum / bufferLength;
                    if(window.update3DAvatar) window.update3DAvatar('speaking', dataArray, avg);
                }
                renderFrame();
                
                source.onended = () => {
                    isPlaying = false;
                    if (currentSourceNode === source) {
                        currentSourceNode = null;
                        setAvatarState('idle');
                        setTimeout(() => subtitles.textContent = '', 2000);
                    }
                };
            } catch (err) {
                console.error("Error playing audio response:", err);
                setAvatarState('error');
                setTimeout(() => setAvatarState('idle'), 2000);
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function sendMessage() {
            ensureAudioContext();
            const text = textInput.value.trim();
            if (text && ws.readyState === WebSocket.OPEN) {
                taskList.innerHTML = ''; // Limpiar tareas anteriores
                ws.send(JSON.stringify({ text }));
                addMessage(text, 'user');
                textInput.value = '';
                setAvatarState('processing');
                subtitles.textContent = '';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        textInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        let micStream;
        let micAudioCtx;
        let micAnalyser;
        let micSource;
        let micRenderActive = false;

        async function setupAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micStream = stream;
                
                // Compatibility for Safari and other browsers that might not support audio/webm
                const options = MediaRecorder.isTypeSupported('audio/webm') ? { mimeType: 'audio/webm' } : {};
                mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks);
                    audioChunks = [];
                    if (ws.readyState === WebSocket.OPEN) {
                        taskList.innerHTML = ''; // Limpiar tareas anteriores
                        ws.send(audioBlob);
                        addMessage("[Mensaje de voz enviado]", 'user');
                        setAvatarState('processing');
                    }
                };
            } catch (err) {
                console.error("Mic error:", err);
                alert("No se pudo acceder al micrófono.");
            }
        }

        async function startRecording() {
            ensureAudioContext();
            if (!mediaRecorder) await setupAudio();
            if (!mediaRecorder || isRecording) return;
            mediaRecorder.start();
            isRecording = true;
            micBtn.classList.add('recording');
            setAvatarState('listening');

            if (micStream) {
                if (!micAudioCtx) {
                    micAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    micAnalyser = micAudioCtx.createAnalyser();
                    micAnalyser.fftSize = 256;
                    micSource = micAudioCtx.createMediaStreamSource(micStream);
                    micSource.connect(micAnalyser);
                }
                if (micAudioCtx.state === 'suspended') await micAudioCtx.resume();
                
                micRenderActive = true;
                const bufferLength = micAnalyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                function renderMicFrame() {
                    if (!isRecording || !micRenderActive) return;
                    requestAnimationFrame(renderMicFrame);
                    micAnalyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for (let i = 0; i < bufferLength; i++) sum += dataArray[i];
                    let avg = sum / bufferLength;
                    if (window.update3DAvatar) window.update3DAvatar('listening', dataArray, avg);
                }
                renderMicFrame();
            }
        }

        function stopRecording() {
            if (!mediaRecorder || !isRecording) return;
            mediaRecorder.stop();
            isRecording = false;
            micBtn.classList.remove('recording');
            micRenderActive = false;
        }

        micBtn.addEventListener('mousedown', startRecording);
        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);

        let spacePressed = false;
        document.addEventListener('keydown', (e) => {
            if(document.activeElement === textInput) return;
            if(e.code === 'Space' && !spacePressed) {
                spacePressed = true;
                e.preventDefault();
                startRecording();
                pttOverlay.classList.remove('visible');
            }
        });

        document.addEventListener('keyup', (e) => {
            if(document.activeElement === textInput) return;
            if(e.code === 'Space') {
                spacePressed = false;
                e.preventDefault();
                stopRecording();
            }
        });

        // Show PTT overlay briefly on load
        setTimeout(() => pttOverlay.classList.add('visible'), 1000);
        setTimeout(() => pttOverlay.classList.remove('visible'), 5000);

        // Starfield and cursor logic optimized natively to improve frame rates and remove clutter.

    </script>

        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",

    <!-- MILO V2 — Ultra-Realistic Black Hole Avatar -->
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass }     from 'three/addons/postprocessing/ShaderPass.js';

        // ═══════════════════════════════════════════════════════
        // RENDERER & SCENE
        // ═══════════════════════════════════════════════════════
        const canvas = document.getElementById('bg-canvas');
        const avatarContainer = document.getElementById('milo-avatar');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.012);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8.5);

        // ═══════════════════════════════════════════════════════
        // POST-PROCESSING
        // ═══════════════════════════════════════════════════════
        const renderScene = new RenderPass(scene, camera);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.45,   // strength — mucho más bajo para no sobreexponer
            0.55,   // radius
            0.55    // threshold — solo píxeles MUY brillantes emiten bloom
        );

        // Gravitational Lensing Shader (post-process)
        const lensingShader = {
            uniforms: {
                tDiffuse:      { value: null },
                uTime:         { value: 0 },
                uStrength:     { value: 0.055 },
                uAudioStrength:{ value: 0.0 },
                uCenter:       { value: new THREE.Vector2(0.5, 0.5) }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uTime;
                uniform float uStrength;
                uniform float uAudioStrength;
                uniform vec2 uCenter;
                varying vec2 vUv;
                void main() {
                    vec2 diff = vUv - uCenter;
                    float dist = length(diff);
                    float strength = uStrength + uAudioStrength;
                    float displacement = strength / (1.0 + dist * dist * 8.0);
                    displacement *= sin(uTime * 0.4) * 0.12 + 0.88;
                    vec2 displacedUv = vUv - normalize(diff + 0.001) * displacement * dist;
                    
                    // High-fidelity chromatic aberration: diagonal color dispersion
                    // Green channel remains perfectly sharp to maintain high-contrast crispness (nítida)
                    float r = texture2D(tDiffuse, displacedUv + vec2(0.001, 0.0006)).r;
                    float g = texture2D(tDiffuse, displacedUv).g;
                    float b = texture2D(tDiffuse, displacedUv - vec2(0.001, -0.0006)).b;
                    float a = texture2D(tDiffuse, displacedUv).a;
                    gl_FragColor = vec4(r, g, b, a);
                }
            `
        };
        const lensingPass = new ShaderPass(lensingShader);
        lensingPass.renderToScreen = true;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.addPass(lensingPass);

        // ═══════════════════════════════════════════════════════
        // STARFIELD
        // ═══════════════════════════════════════════════════════
        const starCount = 2500;
        const starPositions = new Float32Array(starCount * 3);
        const starSizes     = new Float32Array(starCount);
        const starPhases    = new Float32Array(starCount);

        for (let i = 0; i < starCount; i++) {
            starPositions[i*3]   = (Math.random() - 0.5) * 220;
            starPositions[i*3+1] = (Math.random() - 0.5) * 160;
            starPositions[i*3+2] = -Math.random() * 140 - 10;
            starSizes[i]  = 0.05 + Math.pow(Math.random(), 2.0) * 0.20;
            starPhases[i] = Math.random() * Math.PI * 2;
        }

        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeo.setAttribute('size',     new THREE.BufferAttribute(starSizes, 1));
        starGeo.setAttribute('phase',    new THREE.BufferAttribute(starPhases, 1));

        const starMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 }, color: { value: new THREE.Color('#ffffff') } },
            vertexShader: `
                uniform float time; attribute float size; attribute float phase; varying float vTwinkle;
                void main() {
                    vTwinkle = 0.20 + 0.80 * sin(time * (1.2 + sin(phase)*0.4) + phase);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (350.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying float vTwinkle; uniform vec3 color;
                void main() {
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    if (length(coord) > 0.5) discard;
                    gl_FragColor = vec4(color, vTwinkle * (1.0 - length(coord)*2.0));
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
        });

        const starFieldPoints = new THREE.Points(starGeo, starMaterial);
        scene.add(starFieldPoints);

        // ═══════════════════════════════════════════════════════
        // BLACK HOLE CORE GROUP
        // ═══════════════════════════════════════════════════════
        const coreGroup = new THREE.Group();
        coreGroup.position.x = -4.5;
        scene.add(coreGroup);

        // ── EVENT HORIZON — custom absorber shader ──
        const horizonMat = new THREE.ShaderMaterial({
            uniforms: {
                time:               { value: 0 },
                absorptionStrength: { value: 1.2 },
                hawkingExpand:      { value: 0.0 }
            },
            vertexShader: `
                uniform float time; uniform float hawkingExpand;
                varying vec3 vPosition; varying vec3 vNormal;
                void main() {
                    vPosition = position; vNormal = normal;
                    vec3 pos = position;
                    float angle = time * 0.08;
                    float c = cos(angle); float s = sin(angle);
                    pos.xy = mat2(c,-s,s,c) * pos.xy;
                    pos *= 1.0 + hawkingExpand * 0.04;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform float absorptionStrength; uniform float time;
                varying vec3 vPosition; varying vec3 vNormal;

                float hash(vec2 p) {
                    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                }

                float noise(vec2 p) {
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                               mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
                }

                void main() {
                    float dist = length(vPosition);
                    float edge = smoothstep(0.85, 1.0, dist);

                    // Swirling coordinate mapping on the spherical surface
                    vec3 norm = normalize(vNormal);
                    float theta = atan(norm.y, norm.x);
                    float phi = acos(norm.z);
                    
                    // Create slow swirling gravitational wave pattern
                    float ripple = noise(vec2(theta * 3.0 + time * 0.5, phi * 5.0 - time * 0.2));
                    float ripple2 = noise(vec2(theta * 6.0 - time * 0.4, phi * 2.0 + time * 0.3));
                    float wave = (ripple + ripple2) * 0.5;

                    float halo = pow(max(0.0, dot(norm, vec3(0.0, 0.0, 1.0))), 3.0);
                    // Add rippling energy to the edge glow
                    float glow = edge * halo * (0.08 + wave * 0.10);

                    // Event horizon stays black but gets a highly energetic refracting edge
                    float alpha = clamp(1.0 - glow * 0.3 + absorptionStrength * 0.05, 0.9, 1.0);
                    gl_FragColor = vec4(vec3(glow * 0.5), alpha);
                }
            `,
            transparent: true, depthWrite: true
        });

        const eventHorizon = new THREE.Mesh(new THREE.SphereGeometry(1.0, 64, 64), horizonMat);
        eventHorizon.name = 'horizon';
        coreGroup.add(eventHorizon);

        // Einstein ring glow
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0xaaaaaa, transparent: true, opacity: 0.12,
            blending: THREE.AdditiveBlending, side: THREE.BackSide
        });
        coreGroup.add(new THREE.Mesh(new THREE.SphereGeometry(1.06, 64, 64), glowMat));


        // ── PHOTON RING — thin torus at r ≈ 1.5 Schwarzschild ──
        const photonRingMat = new THREE.MeshBasicMaterial({
            color: 0xffffff, transparent: true, opacity: 0.30,
            blending: THREE.AdditiveBlending, side: THREE.DoubleSide
        });
        const photonRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.5, 0.035, 24, 128),
            photonRingMat
        );
        photonRing.name = 'photonRing';
        photonRing.rotation.x = Math.PI * 0.04;
        coreGroup.add(photonRing);

        // ── ACCRETION DISK — procedural texture + toroidal mesh ──
        const tiltedGroup = new THREE.Group();
        tiltedGroup.rotation.x = Math.PI / 5;
        tiltedGroup.rotation.y = Math.PI / 10;
        coreGroup.add(tiltedGroup);

        // MILO V2 Custom GPU Procedural Accretion Disk Shader with Keplerian Shear Flow
        const diskMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uColor: { value: new THREE.Color(0xffffff) },
                uEmissiveIntensity: { value: 0.28 },
                uAudioStrength: { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    vViewPosition = -mvPosition.xyz;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float uTime;
                uniform vec3 uColor;
                uniform float uEmissiveIntensity;
                uniform float uAudioStrength;
                varying vec2 vUv;
                varying vec3 vNormal;
                varying vec3 vViewPosition;

                float hash(vec2 p) {
                    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
                }

                float noise(vec2 p) {
                    vec2 i = floor(p);
                    vec2 f = fract(p);
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                               mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
                }

                float fbm(vec2 p) {
                    float v = 0.0;
                    float a = 0.5;
                    vec2 shift = vec2(100.0);
                    mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
                    for (int i = 0; i < 3; ++i) {
                        v += a * noise(p);
                        p = rot * p * 2.0 + shift;
                        a *= 0.5;
                    }
                    return v;
                }

                void main() {
                    // Torus minor angle (wraps around the tube cross-section)
                    float minorAngle = vUv.y * 6.2831853;
                    
                    // Approximate distance from the singularity (major radius + minor radius offset)
                    float radius = 2.8 + 0.85 * cos(minorAngle);

                    // Keplerian shear flow velocity (faster gas flow nearer to Schwarzschild radius)
                    float speed = 2.4 / sqrt(radius);
                    float flow = uTime * speed;

                    // procedurally flow noise along the accretion disk major circumference
                    vec2 noiseUv = vec2(vUv.x * 14.0 - flow, vUv.y * 3.0 + sin(vUv.x * 6.2831853 + uTime * 0.6) * 0.4);
                    float n = fbm(noiseUv);
                    
                    // Enhance the noise contrast to create wispy, turbulent gas structures
                    n = smoothstep(0.2, 0.8, n);
                    n = pow(n, 2.2) * 1.8;

                    // Fade out boundaries at minor radius limits to look volumetric
                    float fade = sin(vUv.y * 3.14159265);
                    fade = pow(fade, 1.4);

                    // Intensity is noise scaled by emissive controls & audio pulse
                    float intensity = n * fade * (uEmissiveIntensity + uAudioStrength * 0.40);

                    // Hot glowing inner rim effect
                    float innerHot = pow(max(0.0, -cos(minorAngle)), 4.0) * fade * 0.18;
                    intensity += innerHot * 1.2;

                    intensity = pow(intensity, 1.1);

                    // Gaseous high-contrast color blend
                    vec3 finalColor = uColor * (0.15 + intensity * 1.35);
                    
                    // Transparent and volumetric gas opacity with a low base opacity
                    float alpha = 0.02 + smoothstep(0.08, 0.45, intensity) * 0.42;

                    gl_FragColor = vec4(finalColor, alpha);
                }
            `,
            transparent: true,
            depthWrite: false,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending
        });
        const accretionDisk = new THREE.Mesh(new THREE.TorusGeometry(2.8, 0.85, 48, 128), diskMat);
        accretionDisk.name = 'disk';
        accretionDisk.scale.set(1, 1, 0.05); // Flatten the torus to make it a flat disk
        tiltedGroup.add(accretionDisk);

        // Particle ring overlay (Keplerian)
        const RING_PARTICLES = 3000;
        const ringPositions = new Float32Array(RING_PARTICLES * 3);
        const ringColors    = new Float32Array(RING_PARTICLES * 3);
        const ringCustomData = [];
        const innerRadius = 1.6, outerRadius = 4.2;

        for (let i = 0; i < RING_PARTICLES; i++) {
            const r = innerRadius + Math.pow(Math.random(), 2.0) * (outerRadius - innerRadius);
            const theta = Math.random() * Math.PI * 2;
            const x = Math.cos(theta)*r, z = Math.sin(theta)*r, y = (Math.random()-0.5)*0.06;
            ringPositions[i*3]=x; ringPositions[i*3+1]=y; ringPositions[i*3+2]=z;
            const speed = 0.55 / Math.sqrt(r) * (0.9 + Math.random()*0.2);
            ringCustomData.push({
                radius:r, originalRadius:r, angle:theta, speed, yOffset:y,
                svx:0, svy:0, svz:0, dodgeX:0, dodgeY:0, dodgeZ:0
            });
            const br = 0.55 + 0.45*(1-(r-innerRadius)/(outerRadius-innerRadius));
            ringColors[i*3]=br; ringColors[i*3+1]=br; ringColors[i*3+2]=br;
        }

        const ringGeo = new THREE.BufferGeometry();
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        ringGeo.setAttribute('color',    new THREE.BufferAttribute(ringColors, 3));
        ringGeo.attributes.position.usage = THREE.DynamicDrawUsage;

        const ringMat = new THREE.PointsMaterial({
            size:0.05, vertexColors:true, transparent:true, opacity:0.40,
            blending:THREE.AdditiveBlending, sizeAttenuation:true, depthWrite:false
        });
        const accretionRing = new THREE.Points(ringGeo, ringMat);
        tiltedGroup.add(accretionRing);

        // ── RELATIVISTIC JETS — helicoidal particle streams ──
        // ── TESLA COIL LIGHTNING — rayos que huyen del ratón ──
        const TESLA_ARMS    = 12;   // rayos simultáneos
        const TESLA_SEGS    = 14;   // segmentos por rayo (más = más zigzag)
        const TESLA_PTS     = TESLA_ARMS * TESLA_SEGS; // puntos totales de línea

        // Cada rayo es una polyline: TESLA_SEGS puntos
        // Almacenamos todos los brazos en un solo BufferGeometry de LineSegments
        // (cada segmento = par de puntos: inicio → fin)
        const TESLA_SEG_PAIRS = TESLA_ARMS * (TESLA_SEGS - 1); // segmentos dibujados
        const teslaPosArr = new Float32Array(TESLA_SEG_PAIRS * 2 * 3); // 2 pts por segmento, xyz
        const teslaColArr = new Float32Array(TESLA_SEG_PAIRS * 2 * 3);

        const teslaGeo = new THREE.BufferGeometry();
        teslaGeo.setAttribute('position', new THREE.BufferAttribute(teslaPosArr, 3));
        teslaGeo.setAttribute('color',    new THREE.BufferAttribute(teslaColArr, 3));
        teslaGeo.attributes.position.usage = THREE.DynamicDrawUsage;
        teslaGeo.attributes.color.usage    = THREE.DynamicDrawUsage;

        const teslaMat = new THREE.LineBasicMaterial({
            vertexColors: true, transparent: true, opacity: 0.0,
            blending: THREE.AdditiveBlending, depthWrite: false, linewidth: 1
        });
        const teslaLines = new THREE.LineSegments(teslaGeo, teslaMat);
        teslaLines.name = 'jets';
        scene.add(teslaLines);  // en scene, no en coreGroup, para coordenadas mundo

        // Datos por rayo: ángulo base fijo, longitud, fase de ruido
        const teslaArmData = [];
        for (let a = 0; a < TESLA_ARMS; a++) {
            teslaArmData.push({
                baseAngle:  (a / TESLA_ARMS) * Math.PI * 2,   // distribución radial uniforme
                length:     3.5 + Math.random() * 2.5,
                noiseOff:   Math.random() * 100,
                speed:      0.8 + Math.random() * 1.2,        // velocidad de regeneración
                timer:      Math.random() * 0.1               // offset de tiempo inicial
            });
        }

        // Variable de control de opacidad (reemplaza jetMat.opacity)
        let teslaOpacity = 0.0;
        let teslaTargetOpacity = 0.0;

        // ── LENSED HALO — Einstein ring particles ──
        const HALO_PARTICLES = 800;
        const haloPositions  = new Float32Array(HALO_PARTICLES * 3);
        const haloColors     = new Float32Array(HALO_PARTICLES * 3);
        const haloCustomData = [];

        for (let i = 0; i < HALO_PARTICLES; i++) {
            const r=1.4+Math.random()*0.8, theta=Math.random()*Math.PI*2;
            haloPositions[i*3]=Math.cos(theta)*r; haloPositions[i*3+1]=Math.sin(theta)*r; haloPositions[i*3+2]=(Math.random()-0.5)*0.15;
            haloCustomData.push({ radius:r, originalRadius:r, angle:theta, speed:0.2+Math.random()*0.4, zOffset:(Math.random()-0.5)*0.15 });
            const cv=0.7+Math.random()*0.3; haloColors[i*3]=cv; haloColors[i*3+1]=cv; haloColors[i*3+2]=cv;
        }

        const haloGeo = new THREE.BufferGeometry();
        haloGeo.setAttribute('position', new THREE.BufferAttribute(haloPositions, 3));
        haloGeo.setAttribute('color',    new THREE.BufferAttribute(haloColors, 3));
        haloGeo.attributes.position.usage = THREE.DynamicDrawUsage;

        const haloMat = new THREE.PointsMaterial({
            size:0.065, vertexColors:true, transparent:true, opacity:0.45,
            blending:THREE.AdditiveBlending, sizeAttenuation:true, depthWrite:false
        });
        const lensedHalo = new THREE.Points(haloGeo, haloMat);
        coreGroup.add(lensedHalo);

        // ── SHOCKWAVE RINGS ──
        const shockwaveRings = [];
        function spawnShockwave() {
            const mat = new THREE.MeshBasicMaterial({
                color:0xffffff, transparent:true, opacity:0.7,
                side:THREE.DoubleSide, blending:THREE.AdditiveBlending
            });
            const ring = new THREE.Mesh(new THREE.RingGeometry(0.1, 0.35, 48), mat);
            ring.userData.age=0; ring.userData.maxAge=1.4; ring.userData.speed=4.5+Math.random()*2.5;
            scene.add(ring);
            ring.position.copy(coreGroup.position);
            shockwaveRings.push(ring);
        }
        let lastShockwaveTime = 0;

        // ═══════════════════════════════════════════════════════
        // INTERACTIVE TOOLTIP
        // ═══════════════════════════════════════════════════════
        const tooltip = document.createElement('div');
        Object.assign(tooltip.style, {
            position:'fixed', pointerEvents:'none', zIndex:'999',
            background:'rgba(0,0,0,0.8)', border:'1px solid rgba(255,255,255,0.18)',
            color:'#fff', padding:'6px 14px', borderRadius:'8px',
            fontSize:'0.78rem', fontFamily:"'Outfit', sans-serif",
            backdropFilter:'blur(8px)', transition:'opacity 0.2s',
            opacity:'0', letterSpacing:'0.5px', display:'none'
        });
        document.body.appendChild(tooltip);

        function showTooltip(text, x, y) {
            tooltip.textContent = text;
            tooltip.style.left   = (x+14)+'px';
            tooltip.style.top    = (y-30)+'px';
            tooltip.style.opacity= '1';
            tooltip.style.display= 'block';
        }
        function hideTooltip() {
            tooltip.style.opacity = '0';
            setTimeout(() => { if(tooltip.style.opacity==='0') tooltip.style.display='none'; }, 200);
        }

        // ═══════════════════════════════════════════════════════
        // RAYCASTING INTERACTION
        // ═══════════════════════════════════════════════════════
        const raycaster = new THREE.Raycaster();
        const mouseVec  = new THREE.Vector2();
        let   mouseWorld = new THREE.Vector3();
        let   easterEggActive = false, easterEggTimer = 0;

        avatarContainer.addEventListener('click', (e) => {
            mouseVec.x = (e.clientX/window.innerWidth)*2 - 1;
            mouseVec.y = -(e.clientY/window.innerHeight)*2 + 1;
            raycaster.setFromCamera(mouseVec, camera);
            const hits = raycaster.intersectObjects([eventHorizon, accretionDisk, teslaLines], true);
            if (!hits.length) return;
            const obj = hits[0].object;
            if (obj === eventHorizon) {
                easterEggActive = true; easterEggTimer = 2.5;
                bloomTargetStrength = 7.0;
            } else if (obj === accretionDisk) {
                const v = Math.round(30000 / Math.sqrt(2.8));
                showTooltip('Velocidad orbital: ~' + v.toLocaleString() + ' km/s', e.clientX, e.clientY);
                setTimeout(hideTooltip, 2500);
            } else if (obj === teslaLines) {
                teslaTargetOpacity = teslaTargetOpacity > 0.5 ? 0.0 : 0.9;
                showTooltip('Tesla: ' + (teslaTargetOpacity > 0.5 ? 'Activado' : 'Apagado'), e.clientX, e.clientY);
                setTimeout(hideTooltip, 1500);
            }
        });

        avatarContainer.addEventListener('mousemove', (e) => {
            mouseVec.x = (e.clientX/window.innerWidth)*2 - 1;
            mouseVec.y = -(e.clientY/window.innerHeight)*2 + 1;
            const vecT = new THREE.Vector3(mouseVec.x, mouseVec.y, 0.5).unproject(camera);
            const dir = vecT.sub(camera.position).normalize();
            mouseWorld.copy(camera.position).addScaledVector(dir, -camera.position.z / dir.z);
            raycaster.setFromCamera(mouseVec, camera);
            const hits = raycaster.intersectObjects([accretionDisk, eventHorizon, teslaLines], true);
            avatarContainer.style.cursor = hits.length ? 'pointer' : 'default';
        });

        avatarContainer.addEventListener('mouseleave', () => {
            avatarContainer.style.cursor = 'default';
            hideTooltip();
        });

        // ═══════════════════════════════════════════════════════
        // DRAG & ROTATE WITH INERTIA
        // ═══════════════════════════════════════════════════════
        let isDragging = false;
        let prevPointer = { x:0, y:0 };
        let angVel = { x:0, y:0 };
        const inertiaDecay = 0.91;
        let dragBloomBoost = 0;

        avatarContainer.addEventListener('pointerdown', (e) => {
            isDragging = true; prevPointer = { x:e.clientX, y:e.clientY }; angVel = { x:0, y:0 };
        });
        window.addEventListener('pointermove', (e) => {
            if (!isDragging || currentAvatarState === 'processing') return;
            angVel.y = (e.clientX - prevPointer.x) * 0.008;
            angVel.x = -(e.clientY - prevPointer.y) * 0.008;
            coreGroup.rotation.y += angVel.y;
            coreGroup.rotation.x += angVel.x;
            dragBloomBoost = 0.5;
            prevPointer = { x:e.clientX, y:e.clientY };
        });
        window.addEventListener('pointerup',    () => { isDragging = false; });
        window.addEventListener('pointerleave', () => { isDragging = false; });

        // Touch pinch-to-zoom
        let lastPinchDist = 0;
        avatarContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length===2) lastPinchDist = Math.hypot(
                e.touches[0].clientX-e.touches[1].clientX,
                e.touches[0].clientY-e.touches[1].clientY);
        }, {passive:true});
        avatarContainer.addEventListener('touchmove', (e) => {
            if (e.touches.length===2) {
                const dtch = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
                zoomConfig.target = Math.max(5, Math.min(15, zoomConfig.target + (lastPinchDist-dtch)*0.03));
                lastPinchDist = dtch;
            }
        }, {passive:true});

        // ═══════════════════════════════════════════════════════
        // ZOOM CONTROLLER
        // ═══════════════════════════════════════════════════════
        const zoomConfig = { current:8.5, target:8.5, speed:0.05 };

        // ═══════════════════════════════════════════════════════
        // FPS MONITOR (adaptive quality)
        // ═══════════════════════════════════════════════════════
        let fpsCount=0, fpsFrames=0, fpsLastTime=performance.now();
        function updateFPS() {
            fpsFrames++;
            const now = performance.now();
            if (now - fpsLastTime >= 1000) {
                fpsCount = fpsFrames; fpsFrames = 0; fpsLastTime = now;
                // Mantener siempre el post-procesamiento activo a máxima calidad para evitar que la interfaz se desvanezca u opaque
            }
        }

        // ═══════════════════════════════════════════════════════
        // STATE MANAGEMENT
        // ═══════════════════════════════════════════════════════
        let currentAvatarState = 'idle';
        let audioScale = 1.0, audioDataArray = null;
        let mouseX=0, mouseY=0, targetX=0, targetY=0;
        let processingWobble=0, bloomTargetStrength=0.45;

        const stateCfg = {
            idle:       { ring:0xffffff, halo:0xffffff, glow:0x888888, bloom:0.35, jetOp:0.08,  zoom:8.5, lensStr:0.045 },
            processing: { ring:0xc026d3, halo:0xc026d3, glow:0xc026d3, bloom:0.55, jetOp:0.40,  zoom:7.0, lensStr:0.060 },
            speaking:   { ring:0xffffff, halo:0xffffff, glow:0xaaaaaa, bloom:0.50, jetOp:0.06,  zoom:7.5, lensStr:0.045 },
            listening:  { ring:0x00e5bc, halo:0x00e5bc, glow:0x00e5bc, bloom:0.30, jetOp:0.05,  zoom:8.0, lensStr:0.035 },
            error:      { ring:0xff3333, halo:0xff3333, glow:0xff3333, bloom:0.65, jetOp:0.15,  zoom:9.5, lensStr:0.045 }
        };

        window.update3DAvatar = function(state, dataArray, avgVol) {
            currentAvatarState = state;
            audioDataArray     = dataArray;
            if (state==='speaking') {
                audioScale = 1 + (avgVol/256)*0.9;
                lensingPass.uniforms.uAudioStrength.value = (avgVol/256)*0.05;
            } else if (state==='listening') {
                audioScale = 1 + (avgVol/256)*0.8;
                lensingPass.uniforms.uAudioStrength.value = 0;
            } else {
                audioScale = state==='processing' ? 1.1 : 1.0;
                lensingPass.uniforms.uAudioStrength.value = 0;
            }
            const cfg = stateCfg[state] || stateCfg.idle;
            ringMat.color.setHex(cfg.ring);
            haloMat.color.setHex(cfg.halo);
            glowMat.color.setHex(cfg.glow);
            if (diskMat.uniforms && diskMat.uniforms.uColor) {
                diskMat.uniforms.uColor.value.setHex(cfg.ring);
            }
            bloomTargetStrength  = cfg.bloom;
            teslaTargetOpacity   = cfg.jetOp;
            zoomConfig.target    = cfg.zoom;
            lensingPass.uniforms.uStrength.value = cfg.lensStr;
        };

        // ═══════════════════════════════════════════════════════
        // ANIMATION LOOP
        // ═══════════════════════════════════════════════════════
        const clock = new THREE.Clock();

        function applyInertia(dt) {
            if (!isDragging) {
                coreGroup.rotation.y += angVel.y;
                coreGroup.rotation.x += angVel.x;
                const df = Math.pow(inertiaDecay, dt*60);
                angVel.x *= df; angVel.y *= df;
            }
            dragBloomBoost *= 0.9;
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();
            const dt = Math.min(clock.getDelta(), 0.05);

            updateFPS();



            // Lensing time uniform
            lensingPass.uniforms.uTime.value = elapsed;

            // Smooth mouse lag
            const lerpFactor = 1 - Math.exp(-2.5*dt);
            targetX += (mouseX - targetX) * lerpFactor;
            targetY += (mouseY - targetY) * lerpFactor;

            // Event horizon shader time + Hawking expand
            horizonMat.uniforms.time.value = elapsed;
            const hoverHawking = currentAvatarState==='speaking'
                ? (audioScale-1)*0.8
                : 0;
            horizonMat.uniforms.hawkingExpand.value = hoverHawking;

            // Einstein ring glow slow pulsation
            glowMat.opacity = 0.08 + Math.sin(elapsed * 2.2) * 0.03;

            // Bloom total suavizado con un pulso en reposo (idle) para darle vida y que no se apague
            const idleBloomPulse = (currentAvatarState === 'idle') ? Math.sin(elapsed * 2.0) * 0.04 + 0.04 : 0;
            bloomPass.strength += (bloomTargetStrength + dragBloomBoost + idleBloomPulse - bloomPass.strength) * 0.06;

            // ── ROTACIÓN Y MOVIMIENTO CONTINUO (siempre activo) ──
            if (currentAvatarState==='processing' && !isDragging) {
                processingWobble += dt * 2.5;
                coreGroup.rotation.y  = elapsed * 0.8;
                coreGroup.rotation.z  = Math.sin(processingWobble*2.0)*0.12;
                coreGroup.rotation.x  = Math.cos(processingWobble*1.5)*0.08;
            } else if (!isDragging) {
                // IDLE/SPEAKING/LISTENING: movimiento orbítal continuo suave
                // Nunca se queda estático
                const idleSpeed = currentAvatarState==='speaking' ? 0.18 : 0.07;
                const idleTilt  = currentAvatarState==='speaking' ? 0.06 : 0.03;

                // Rotación Y lenta continua (como planetas)
                coreGroup.rotation.y += idleSpeed * dt + angVel.y; // inercia del drag

                // Cabeceo suave en X y Z (respiración)
                const breatheX = Math.sin(elapsed * 0.7 + 1.2) * idleTilt;
                const breatheZ = Math.sin(elapsed * 0.5) * idleTilt * 0.6;

                coreGroup.rotation.x += (breatheX - coreGroup.rotation.x) * 0.03;
                coreGroup.rotation.z += (breatheZ - coreGroup.rotation.z) * 0.03;

                // Decaer inercia del drag
                const df2 = Math.pow(inertiaDecay, dt*60);
                angVel.x *= df2; angVel.y *= df2;
            }

            // Easter egg (horizon click)
            if (easterEggActive) {
                easterEggTimer -= dt;
                coreGroup.rotation.y += 0.15;
                if (easterEggTimer<=0) {
                    easterEggActive=false;
                    bloomTargetStrength = currentAvatarState==='processing' ? 3.5 : 1.8;
                }
            }

            // Photon ring pulsation
            if (currentAvatarState==='processing') {
                photonRingMat.opacity = 0.25 + Math.sin(elapsed*18)*0.08;
            } else if (currentAvatarState==='speaking' && audioDataArray) {
                const vol = audioDataArray.reduce((a,b)=>a+b,0)/(audioDataArray.length*255);
                photonRingMat.opacity = 0.20 + vol*0.20;
            } else {
                photonRingMat.opacity = 0.15 + Math.sin(elapsed*1.8)*0.04;
            }
            photonRing.rotation.z = elapsed * 0.28;

            // Accretion disk — rotación + perturbaciones procedimentales
            const dSpeed = currentAvatarState==='processing' ? 0.9
                : currentAvatarState==='speaking' ? 0.55
                : 0.35; // Slightly faster in idle to feel alive and dynamic
            accretionDisk.rotation.z += dSpeed * dt * 0.6;
            
            const pertAmp  = currentAvatarState==='processing' ? 0.35 : 0.12;
            const pertFreq = currentAvatarState==='processing' ? 3.5  : 1.2;
            
            if (diskMat.uniforms) {
                diskMat.uniforms.uTime.value = elapsed;
                diskMat.uniforms.uEmissiveIntensity.value = (currentAvatarState==='speaking' && audioDataArray)
                    ? 0.38 + audioDataArray.reduce((a,b)=>a+b,0)/(audioDataArray.length*255)*0.45
                    : 0.32 + Math.sin(elapsed*pertFreq)*pertAmp;
                
                if (currentAvatarState==='speaking' && audioDataArray) {
                    const vol = audioDataArray.reduce((a,b)=>a+b,0)/(audioDataArray.length*255);
                    diskMat.uniforms.uAudioStrength.value = vol;
                } else {
                    diskMat.uniforms.uAudioStrength.value = 0.0;
                }
            }

            // Particle ring physics
            const ringPosAttr = accretionRing.geometry.attributes.position;
            const wc = new THREE.Vector3(mouseWorld.x, mouseWorld.y, 0);
            const lc = wc.clone().sub(coreGroup.position);
            lc.applyMatrix4(new THREE.Matrix4().makeRotationX(-tiltedGroup.rotation.x)
                .multiply(new THREE.Matrix4().makeRotationY(-tiltedGroup.rotation.y)));

            const stiff=10, damp=0.80, inflR=1.6, maxD=0.7;
            const el2=elapsed*2, el5=elapsed*5, el7=elapsed*7, el10=elapsed*10, el12=elapsed*12, el15=elapsed*15;

            for (let i=0; i<RING_PARTICLES; i++) {
                const d = ringCustomData[i];
                if (currentAvatarState==='processing') {
                    d.angle += d.speed * (4.5+Math.sin(el2+d.angle)*1.5) * dt;
                    d.radius -= (2.5+Math.sin(d.angle*3+el5)) * dt * d.speed;
                    if (d.radius < innerRadius) { d.radius=outerRadius-Math.random()*2.5; d.angle+=(Math.random()-0.5)*0.6; }
                    const lw = Math.sin(d.radius*2.5-el12)*0.2;
                    ringPosAttr.setXYZ(i, Math.cos(d.angle)*d.radius, d.yOffset+lw, Math.sin(d.angle)*d.radius);

                } else if (currentAvatarState==='speaking' && audioDataArray) {
                    d.radius=d.originalRadius; d.angle+=d.speed*1.1*dt;
                    const ai=Math.floor((d.angle/(Math.PI*2))*audioDataArray.length)%audioDataArray.length;
                    const av=audioDataArray[ai]/255;
                    const expR = d.radius + Math.sin(d.radius*0.8-el10)*av*1.2 + Math.cos(d.angle*3+el7)*av*0.5;
                    ringPosAttr.setXYZ(i,
                        Math.cos(d.angle)*expR, d.yOffset + Math.sin(d.radius*1.5-el15)*av*1.5, Math.sin(d.angle)*expR);

                } else if (currentAvatarState==='listening') {
                    d.radius=d.originalRadius; d.angle+=d.speed*dt;
                    const pulse=Math.sin(d.angle*4+el10)*(audioScale-1)*2;
                    ringPosAttr.setXYZ(i, Math.cos(d.angle)*(d.radius+pulse), d.yOffset, Math.sin(d.angle)*(d.radius+pulse));

                } else if (currentAvatarState==='error') {
                    let ex=ringPosAttr.getX(i)+(Math.random()-0.5)*0.3;
                    let ey=ringPosAttr.getY(i)+(Math.random()-0.5)*0.3;
                    let ez=ringPosAttr.getZ(i)+(Math.random()-0.5)*0.3;
                    const dv=Math.sqrt(ex*ex+ey*ey+ez*ez);
                    if (dv>12||dv<1) { ex=Math.cos(d.angle)*d.radius; ez=Math.sin(d.angle)*d.radius; ey=d.yOffset; }
                    ringPosAttr.setXYZ(i, ex, ey, ez);

                } else {
                    // IDLE: órbita Kepleriana
                    d.angle += d.speed * dt;
                    const ox=Math.cos(d.angle)*d.originalRadius, oz=Math.sin(d.angle)*d.originalRadius, oy=d.yOffset;

                    // Spring-damper dodge del mouse
                    const cdx=ox-lc.x, cdy=oy-lc.y, cdz=oz-lc.z;
                    const dc=Math.sqrt(cdx*cdx+cdy*cdy+cdz*cdz+0.001);
                    let tx=0, ty=0, tz=0;
                    if (dc<inflR) {
                        const t=dc/inflR, sm=1-(t*t*(3-2*t)), dp=sm*maxD, inv=1/(dc+0.001);
                        tx=cdx*inv*dp; ty=cdy*inv*dp*0.3; tz=cdz*inv*dp;
                    }
                    d.svx+=(tx-d.dodgeX)*stiff*dt; d.svy+=(ty-d.dodgeY)*stiff*dt; d.svz+=(tz-d.dodgeZ)*stiff*dt;
                    const dfr=Math.pow(damp,dt*60);
                    d.svx*=dfr; d.svy*=dfr; d.svz*=dfr;
                    d.dodgeX+=d.svx*dt; d.dodgeY+=d.svy*dt; d.dodgeZ+=d.svz*dt;

                    // Onda de perturbación sinusoidal 3D para que el disco de partículas parezca fluido y vivo en reposo
                    const waveRipple = Math.sin(elapsed * 1.5 + d.angle * 3.0) * 0.08;
                    const radialRipple = Math.cos(elapsed * 1.2 + d.angle * 2.0) * 0.06;
                    ringPosAttr.setXYZ(i, ox + d.dodgeX + Math.cos(d.angle)*radialRipple, oy + d.dodgeY + waveRipple, oz + d.dodgeZ + Math.sin(d.angle)*radialRipple);
                }
            }
            ringPosAttr.needsUpdate = true;

            // Lensed halo physics
            const haloPosAttr = lensedHalo.geometry.attributes.position;
            const el3=elapsed*3, el6=elapsed*6, el4=elapsed*4, el8=elapsed*8;

            for (let i=0; i<HALO_PARTICLES; i++) {
                const d=haloCustomData[i];
                if (currentAvatarState==='processing') {
                    d.angle += d.speed*(5+Math.sin(el3+i*0.01)*2)*dt;
                    const breathe=1+Math.sin(el6+d.angle*2)*0.25;
                    haloPosAttr.setXYZ(i, Math.cos(d.angle)*d.originalRadius*breathe, Math.sin(d.angle)*d.originalRadius*breathe, d.zOffset+Math.sin(el4+i)*0.1);
                } else if (currentAvatarState==='speaking' && audioDataArray) {
                    d.angle+=d.speed*1.3*dt;
                    const hai=Math.floor((d.angle/(Math.PI*2))*audioDataArray.length)%audioDataArray.length;
                    const hav=audioDataArray[hai]/255;
                    const br=d.originalRadius+hav*2.0+Math.sin(el8+d.angle)*hav*0.6;
                    haloPosAttr.setXYZ(i, Math.cos(d.angle)*br, Math.sin(d.angle)*br, d.zOffset);
                } else if (currentAvatarState==='listening') {
                    d.angle+=d.speed*dt;
                    const vibe=Math.sin(d.angle*8+elapsed*15)*(audioScale-1)*1.5;
                    haloPosAttr.setXYZ(i, Math.cos(d.angle)*(d.radius+vibe), Math.sin(d.angle)*(d.radius+vibe), d.zOffset);
                } else if (currentAvatarState==='error') {
                    haloPosAttr.setXYZ(i,
                        haloPosAttr.getX(i)+(Math.random()-0.5)*0.2,
                        haloPosAttr.getY(i)+(Math.random()-0.5)*0.2,
                        haloPosAttr.getZ(i)+(Math.random()-0.5)*0.2);
                } else {
                    d.angle+=d.speed*dt;
                    // El halo lensed respira lentamente en ondas simulando lente gravitacional oscilante
                    const breathe = 1.0 + Math.sin(elapsed * 1.8 + d.angle * 2.0) * 0.08;
                    haloPosAttr.setXYZ(i, Math.cos(d.angle)*d.radius*breathe, Math.sin(d.angle)*d.radius*breathe, d.zOffset);
                }
            }
            haloPosAttr.needsUpdate = true;

            // ── TESLA COIL — rayos zigzag que huyen del ratón ──
            // Actividad eléctrica dinámica en todos los estados para mantener la viveza y movimiento extra
            let targetJetOp = teslaTargetOpacity;
            if (currentAvatarState === 'idle') {
                targetJetOp = 0.06 + Math.sin(elapsed * 1.5) * 0.03;
            } else if (currentAvatarState === 'listening') {
                targetJetOp = 0.04 + Math.sin(elapsed * 2.0) * 0.02;
            } else if (currentAvatarState === 'speaking') {
                targetJetOp = 0.05 + Math.sin(elapsed * 2.5) * 0.02;
            } else if (currentAvatarState === 'error') {
                targetJetOp = 0.12 + Math.sin(elapsed * 3.0) * 0.05;
            }
            teslaOpacity += (targetJetOp - teslaOpacity) * 0.08;
            teslaMat.opacity = teslaOpacity;

            if (teslaOpacity > 0.01) {
                // Origen en el coreGroup, en coordenadas mundo
                const origin = new THREE.Vector3();
                coreGroup.getWorldPosition(origin);

                // Vector ratón en mundo (ya existe mouseWorld)
                const mw = mouseWorld.clone();

                const tPos = teslaGeo.attributes.position;
                const tCol = teslaGeo.attributes.color;

                // Intensidad extra en processing
                const intensity = currentAvatarState==='processing' ? 1.0 : 0.65;
                // Regenerar más rápido en processing
                const regenRate = currentAvatarState==='processing' ? 8.0 : 3.5;

                let segIdx = 0; // índice de par de segmentos

                for (let a = 0; a < TESLA_ARMS; a++) {
                    const arm = teslaArmData[a];
                    arm.timer += dt * regenRate;

                    // Ángulo base gira lentamente + se regenera periódicamente
                    const baseA = arm.baseAngle + elapsed * 0.15 * (a % 2 === 0 ? 1 : -1);

                    // Dirección base 2D del rayo (en el plano XY de pantalla)
                    const dirX = Math.cos(baseA);
                    const dirY = Math.sin(baseA);

                    // Vector perpendicular al rayo (para zigzag)
                    const perpX = -dirY;
                    const perpY =  dirX;

                    // Vector de huida del ratón: apunta LEJOS del cursor desde el origen
                    const toMouse = new THREE.Vector3(
                        mw.x - origin.x, mw.y - origin.y, 0
                    );
                    const mouseDist = toMouse.length() + 0.001;
                    // Fuerza de desvío: más fuerte cuanto más cerca esté el ratón
                    const fleeStr = Math.min(1.5, 3.5 / (mouseDist * mouseDist + 0.5));
                    // Componente de huida proyectada sobre la perp del rayo
                    const fleeDot = (-toMouse.x / mouseDist) * perpX + (-toMouse.y / mouseDist) * perpY;

                    // Construir los puntos del rayo segmento a segmento
                    let px = origin.x, py = origin.y;
                    const armLen = arm.length * (0.85 + Math.sin(arm.timer * 0.7 + a) * 0.15);

                    // Punto anterior (inicio del primer segmento)
                    let prevX = px, prevY = py;

                    for (let s = 1; s < TESLA_SEGS; s++) {
                        const t = s / (TESLA_SEGS - 1); // 0..1 a lo largo del rayo

                        // Posición base a lo largo del eje del rayo
                        const baseX = origin.x + dirX * t * armLen;
                        const baseY = origin.y + dirY * t * armLen;

                        // Ruido pseudo-aleatorio regenerado por timer
                        const noiseT = arm.noiseOff + arm.timer + s * 0.9 + a * 3.7;
                        const jitter = (Math.sin(noiseT * 2.3) * Math.cos(noiseT * 1.7)) * 0.6;

                        // Zigzag perpendicular (alterna signo por segmento)
                        const zigzag = jitter * (1.0 - t * 0.5); // se amortigua en la punta

                        // Desvío de huida: máximo en la parte media del rayo
                        const fleeShape = Math.sin(t * Math.PI); // 0 en base, máx en medio, 0 en punta
                        const fleeX = perpX * fleeDot * fleeStr * fleeShape * armLen * 0.5;
                        const fleeY = perpY * fleeDot * fleeStr * fleeShape * armLen * 0.5;

                        const curX = baseX + perpX * zigzag + fleeX;
                        const curY = baseY + perpY * zigzag + fleeY;

                        // Guardar par de vértices (segmento prevX,prevY → curX,curY)
                        const vi = segIdx * 2;
                        // Vértice A (inicio segmento)
                        tPos.setXYZ(vi,   prevX, prevY, 0);
                        // Vértice B (fin segmento)
                        tPos.setXYZ(vi+1, curX,  curY,  0);

                        // Color: más brillante en la base, desvanece en la punta
                        const bright = intensity * (1.0 - t * 0.75);
                        tCol.setXYZ(vi,   bright, bright, bright);
                        tCol.setXYZ(vi+1, bright * 0.6, bright * 0.6, bright * 0.6);

                        prevX = curX; prevY = curY;
                        segIdx++;
                    }
                }

                tPos.needsUpdate = true;
                tCol.needsUpdate = true;

                // Sincronizar posición del objeto con el origen (para raycasting)
                teslaLines.position.set(0, 0, 0);
            }

            // Speaking shockwave rings
            if (currentAvatarState==='speaking' && elapsed-lastShockwaveTime>0.22) {
                spawnShockwave(); lastShockwaveTime=elapsed;
            }
            for (let ri=shockwaveRings.length-1; ri>=0; ri--) {
                const r=shockwaveRings[ri];
                r.userData.age+=dt;
                const prog=r.userData.age/r.userData.maxAge;
                r.scale.setScalar(r.userData.speed*r.userData.age*0.5+1);
                r.material.opacity=0.7*(1-prog);
                r.position.copy(coreGroup.position);
                if (r.userData.age>=r.userData.maxAge) {
                    scene.remove(r); r.geometry.dispose(); r.material.dispose();
                    shockwaveRings.splice(ri,1);
                }
            }

            // Scale transitions
            let tScale;
            if (currentAvatarState==='speaking'||currentAvatarState==='listening') tScale=audioScale;
            else if (currentAvatarState==='processing') tScale=1.05+Math.sin(elapsed*5)*0.055;
            else {
                // Respiración cósmica dual para el estado idle (dos frecuencias superpuestas)
                tScale = 1.0 + Math.sin(elapsed * 1.2) * 0.035 + Math.sin(elapsed * 2.8) * 0.012;
            }

            // Dynamic position and scale tracking to align with DOM container
            let targetXCoord = -4.5;
            let targetYCoord = 0;
            let baseScale = 0.55; // default fallback scale
            const rect = avatarContainer.getBoundingClientRect();
            if (rect.width > 0 && window.innerHeight > 0) {
                const ndcX = ((rect.left + rect.width / 2) / window.innerWidth) * 2 - 1;
                const ndcY = -((rect.top + rect.height / 2) / window.innerHeight) * 2 + 1;
                const vec = new THREE.Vector3(ndcX, ndcY, 0.5).unproject(camera);
                const dir = vec.sub(camera.position).normalize();
                const dist = -camera.position.z / dir.z;
                const domTargetPos = camera.position.clone().addScaledVector(dir, dist);
                targetXCoord = domTargetPos.x;
                targetYCoord = domTargetPos.y;

                // Dynamically calculate base scale based on fov and container width
                const fovRad = camera.fov * Math.PI / 360;
                const screenHeight3D = 2 * camera.position.z * Math.tan(fovRad);
                const screenWidth3D = screenHeight3D * camera.aspect;
                const containerWidth3D = (rect.width / window.innerWidth) * screenWidth3D;
                // Scale coreGroup so that its max size (diameter ~7.5 units) fits the container width
                baseScale = containerWidth3D / 7.5;
            }

            // Apply scale
            const finalScale = baseScale * tScale;
            coreGroup.scale.lerp(new THREE.Vector3(finalScale, finalScale, finalScale), 1-Math.exp(-3.5*dt));

            // Position drift
            if (currentAvatarState==='error') {
                coreGroup.position.x = targetXCoord + (Math.random()-0.5)*0.4;
                coreGroup.position.y = targetYCoord + (Math.random()-0.5)*0.4;
            } else {
                const dX = currentAvatarState==='processing' ? Math.sin(elapsed*3)*0.9 : 0;
                const dY = currentAvatarState==='processing' ? Math.cos(elapsed*2.4)*0.6 : 0;
                const pL = 1-Math.exp(-3*dt);
                coreGroup.position.x += (targetXCoord + targetX*0.5 + dX - coreGroup.position.x)*pL;
                coreGroup.position.y += (targetYCoord - targetY*0.5 + dY - coreGroup.position.y)*pL;
            }

            // Project coreGroup world position to screen space for lensing shader
            const worldPos = new THREE.Vector3();
            coreGroup.getWorldPosition(worldPos);
            worldPos.project(camera);
            lensingPass.uniforms.uCenter.value.set((worldPos.x + 1) / 2, (worldPos.y + 1) / 2);

            // Camera zoom
            zoomConfig.current += (zoomConfig.target-zoomConfig.current)*zoomConfig.speed;
            zoomConfig.current  = Math.max(5, Math.min(15, zoomConfig.current));
            camera.position.z   = zoomConfig.current;

            // Starfield
            starMaterial.uniforms.time.value = elapsed;
            starFieldPoints.rotation.y = elapsed*0.002 + targetX*0.03;
            starFieldPoints.rotation.x = targetY*0.03;

            composer.render();
        }

        animate();

        // Global mouse tracking
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX/window.innerWidth - 0.5)*2;
            mouseY = (e.clientY/window.innerHeight - 0.5)*2;
        });

        // Resize handler
        function resize() {
            const w=window.innerWidth, h=window.innerHeight;
            renderer.setSize(w,h); composer.setSize(w,h);
            bloomPass.setSize(w,h);
            camera.aspect=w/h; camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

    </script>
</body>
