services:
  milo-api:
    build: .
    container_name: milo_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - .:/app
      # Ignore the local virtual env inside the docker container
      - /app/.venv
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
